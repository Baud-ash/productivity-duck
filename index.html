<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- iOS full screen -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<!-- App icon -->
<link rel="apple-touch-icon" sizes="180x180" href="IMG_1133.png">

<title>Monthly Productivity</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{
--bg:#0f1416;
--panel:#161c1f;
--accent:#0f766e;
--text:#e5e7eb;
--border:#243036;
}

body{
font-family:Inter,system-ui;
background:var(--bg);
color:var(--text);
margin:0;
padding:20px;
}

.settings{
position:absolute;
top:15px;
right:15px;
font-size:22px;
cursor:pointer;
}

/* panels */

.panel{
background:var(--panel);
padding:14px;
border-radius:10px;
margin-bottom:18px;
border:1px solid var(--border);
box-shadow:0 0 6px rgba(15,118,110,0.15),0 0 20px rgba(15,118,110,0.05);
}

/* goals editor */

.goals-editor{
display:none;
margin-bottom:20px;
}

input[type=text]{
width:100%;
padding:7px;
margin-bottom:6px;
background:#0b1012;
border:1px solid var(--border);
color:var(--text);
border-radius:5px;
}

button{
padding:7px 12px;
background:var(--accent);
border:none;
border-radius:5px;
color:white;
cursor:pointer;
}

/* table */

table{
border-collapse:collapse;
width:100%;
font-size:14px;
}

td{
border-bottom:1px solid var(--border);
padding:6px;
text-align:center;
}

.table-wrapper{
overflow-x:auto;
}

/* diagonal goals */

.goal-label{
position:absolute;
transform:rotate(-45deg);
transform-origin:left bottom;
font-size:12px;
color:#9ca3af;
}

.goal-container{
position:relative;
height:25px;
}

/* checkbox */

input[type=checkbox]{
appearance:none;
width:18px;
height:18px;
border:1px solid var(--border);
border-radius:4px;
background:#050708;
cursor:pointer;
}

input[type=checkbox]:checked{
background:var(--accent);
box-shadow:0 0 6px rgba(45,212,191,0.7);
}

/* done column */

.done-cell{
text-align:left;
font-family:monospace;
letter-spacing:2px;
}

/* current day */

.current-day{
background:rgba(15,118,110,0.08);
box-shadow:inset 0 0 8px rgba(15,118,110,0.25);
}

/* radar */

canvas{
margin-top:18px;
background:#0b1012;
border-radius:8px;
padding:8px;
}

</style>
</head>

<body>

<div class="settings" onclick="toggleGoals()">⚙</div>

<h2>Monthly Productivity</h2>

<div class="panel goals-editor" id="goalsPanel">

<h3>Goals</h3>
<div id="goalInputs"></div>

<button onclick="saveGoals()">Save</button>
<button onclick="resetMonth()" style="margin-left:8px;background:#7f1d1d;">Reset Month</button>

</div>

<div class="panel">

<div id="goalLabels"></div>

<div class="table-wrapper">
<table>
<tbody id="tableBody"></tbody>
</table>
</div>

<canvas id="radarChart"></canvas>

</div>

<script>

/* date */
const today = new Date().getDate()
const currentMonth = new Date().getMonth()

/* storage */
let goals = JSON.parse(localStorage.getItem("goals")) || ["","","","",""]

let data = JSON.parse(localStorage.getItem("data")) ||
Array.from({length:31},()=>[false,false,false,false,false])

/* auto reset month */
let savedMonth = localStorage.getItem("savedMonth")

if(savedMonth === null){
localStorage.setItem("savedMonth", currentMonth)
}

if(savedMonth != currentMonth){

data = Array.from({length:31},()=>[false,false,false,false,false])

localStorage.setItem("data", JSON.stringify(data))
localStorage.setItem("savedMonth", currentMonth)

}

/* toggle settings */

function toggleGoals(){

let p=document.getElementById("goalsPanel")

p.style.display = p.style.display==="block" ? "none":"block"

}

/* goal inputs */

const goalInputs = document.getElementById("goalInputs")

function renderGoalInputs(){

goalInputs.innerHTML=""

for(let i=0;i<5;i++){

let input=document.createElement("input")

input.type="text"
input.placeholder="Goal "+(i+1)
input.value=goals[i]

input.oninput=(e)=>goals[i]=e.target.value

goalInputs.appendChild(input)

}

}

renderGoalInputs()

function saveGoals(){

localStorage.setItem("goals",JSON.stringify(goals))

renderGoalLabels()
renderTable()
updateRadar()

toggleGoals()

}

/* labels */

function renderGoalLabels(){

let container=document.getElementById("goalLabels")

container.innerHTML=""

goals.forEach((g,i)=>{

let wrap=document.createElement("div")
wrap.className="goal-container"

let label=document.createElement("div")
label.className="goal-label"

label.style.left=(60 + i*60)+"px"
label.textContent=g

wrap.appendChild(label)
container.appendChild(wrap)

})

}

renderGoalLabels()

/* table */

const tableBody=document.getElementById("tableBody")

function renderTable(){

tableBody.innerHTML=""

for(let d=0;d<31;d++){

let row=document.createElement("tr")

if(d+1===today){
row.classList.add("current-day")
}

let dayCell=document.createElement("td")
dayCell.textContent=d+1
row.appendChild(dayCell)

let count=0

for(let g=0;g<5;g++){

let cell=document.createElement("td")

let box=document.createElement("input")
box.type="checkbox"
box.checked=data[d][g]

box.onchange=()=>{

data[d][g]=box.checked

localStorage.setItem("data",JSON.stringify(data))

renderTable()
updateRadar()

}

cell.appendChild(box)
row.appendChild(cell)

if(box.checked) count++

}

let graph=document.createElement("td")
graph.className="done-cell"
graph.textContent="▮".repeat(count)

row.appendChild(graph)

tableBody.appendChild(row)

}

}

renderTable()

/* radar */

function computeTotals(){

let totals=[0,0,0,0,0]

for(let d=0;d<31;d++){

for(let g=0;g<5;g++){

if(data[d][g]) totals[g]++

}

}

return totals

}

const radar=new Chart(
document.getElementById("radarChart"),
{
type:"radar",
data:{
labels:goals,
datasets:[{
data:computeTotals(),
backgroundColor:"rgba(15,118,110,0.3)",
borderColor:"#0f766e",
borderWidth:2
}]
},
options:{
plugins:{legend:{display:false}},
scales:{
r:{
min:0,
max:31,
ticks:{display:false},
grid:{color:"rgba(255,255,255,0.08)"}
}
}
}
}
)

function updateRadar(){

radar.data.labels=goals
radar.data.datasets[0].data=computeTotals()
radar.update()

}

/* manual reset */

function resetMonth(){

if(!confirm("Reset all data for the month?")) return

data = Array.from({length:31},()=>[false,false,false,false,false])

localStorage.setItem("data",JSON.stringify(data))

renderTable()
updateRadar()

}

</script>

</body>
</html>
